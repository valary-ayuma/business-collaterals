        <section class="contact-form-section">
           
            <div class="contact-header">
                <h1>Let's Create Something Amazing</h1>
                <p>Have a project in mind? We'd love to hear about it. Fill out the form below or email us directly.</p>
            </div>


            <form class="contact-form">
                <div class="form-row">
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                    <input type="tel" id="phone" name="phone" placeholder="Your Phone Number eg.0712345678" required maxlength="10" pattern="[0-9]" tittle="please enter exactly 10 digits">
                </div>
                <textarea id="project-details" name="project-details" placeholder="Tell us about your project..." rows="8" required></textarea>
                <button type="submit" class="submit-button">Start Your Project</button>
            </form>
